  type: http
  seq: 2
  tags:
    - node

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/node/:nodeId"
  params:
    - name: cluster
      value: ""
      type: path
    - name: nodeId
      value: ""
      type: path
  auth: inherit

settings:

info:
  name: Delete data from a topic by key
  type: http
  seq: 5
  tags:
    - topic_data

http:
  method: DELETE
  url: "{{baseUrl}}/api/:cluster/topic/:topicName/data"
  params:
    - name: cluster
      value: ""
      type: path
    - name: topicName
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "partition": 0,
        "key": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


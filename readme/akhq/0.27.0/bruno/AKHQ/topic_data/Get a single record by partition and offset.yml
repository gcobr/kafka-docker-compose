  type: http
  seq: 7
  tags:
    - topic_data

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/topic/:topicName/data/record/:partition/:offset"
  params:
    - name: cluster
      value: ""
      type: path
    - name: topicName
      value: ""
      type: path
    - name: partition
      value: ""
      type: path
    - name: offset
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


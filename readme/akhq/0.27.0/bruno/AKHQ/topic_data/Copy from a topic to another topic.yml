info:
  name: Copy from a topic to another topic
  type: http
  seq: 2
  tags:
    - topic_data

http:
  method: POST
  url: "{{baseUrl}}/api/:cluster/topic/:fromTopicName/copy/:toCluster/topic/:toTopicName"
  params:
    - name: cluster
      value: ""
      type: path
    - name: fromTopicName
      value: ""
      type: path
    - name: toCluster
      value: ""
      type: path
    - name: toTopicName
      value: ""
      type: path
  body:
    type: json
    data: |-
      [
        {
          "partition": 0,
          "offset": 0
        }
      ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: copy 200 response
    request:
      url: "{{baseUrl}}/api/:cluster/topic/:fromTopicName/copy/:toCluster/topic/:toTopicName"
      method: POST
      params:
        - name: cluster
          value: ""
          type: path
        - name: fromTopicName
          value: ""
          type: path
        - name: toCluster
          value: ""
          type: path
        - name: toTopicName
          value: ""
          type: path
      body:
        type: json
        data: |-
          [
            {
              "partition": 0,
              "offset": 0
            }
          ]
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "records": 0
          }

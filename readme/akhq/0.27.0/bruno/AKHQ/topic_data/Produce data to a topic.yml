info:
  name: Produce data to a topic
  type: http
  seq: 4
  tags:
    - topic_data

http:
  method: POST
  url: "{{baseUrl}}/api/:cluster/topic/:topicName/data"
  params:
    - name: cluster
      value: ""
      type: path
    - name: topicName
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "value": "",
        "key": "",
        "partition": 0,
        "timestamp": "",
        "headers": [
          {
            "key": "",
            "value": ""
          }
        ],
        "keySchema": "",
        "valueSchema": "",
        "multiMessage": false,
        "keyValueSeparator": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


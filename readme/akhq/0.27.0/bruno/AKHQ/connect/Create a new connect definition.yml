info:
  name: Create a new connect definition
  type: http
  seq: 2
  tags:
    - connect

http:
  method: POST
  url: "{{baseUrl}}/api/:cluster/connect/:connectId"
  params:
    - name: cluster
      value: ""
      type: path
    - name: connectId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "name": "",
        "configs": {}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


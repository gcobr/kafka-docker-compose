info:
  name: Retrieve a connect plugin
  type: http
  seq: 4
  tags:
    - connect

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/connect/:connectId/plugins/:type"
  params:
    - name: cluster
      value: ""
      type: path
    - name: connectId
      value: ""
      type: path
    - name: type
      value: ""
      type: path
  auth: inherit

settings:

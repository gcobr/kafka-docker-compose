info:
  name: Get ui options for cluster
  type: http
  seq: 4
  tags:
    - AKHQ

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/ui-options"
  params:
    - name: cluster
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: options 200 response
    request:
      url: "{{baseUrl}}/api/:cluster/ui-options"
      method: GET
      params:
        - name: cluster
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "topic": {
              "defaultView": "",
              "skipConsumerGroups": false,
              "skipLastRecord": false,
              "showAllConsumerGroups": false,
              "groupsDefaultView": ""
            },
            "topicData": {
              "sort": "",
              "dateTimeFormat": "RELATIVE"
            }
          }

info:
  name: Get all auth details for current instance
  type: http
  seq: 1
  tags:
    - AKHQ

http:
  method: GET
  url: "{{baseUrl}}/api/auths"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: auths 200 response
    request:
      url: "{{baseUrl}}/api/auths"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "loginEnabled": false,
            "formEnabled": false,
            "oidcAuths": [
              {
                "key": "",
                "label": ""
              }
            ],
            "oauthAuths": [
              {
                "key": "",
                "label": ""
              }
            ],
            "version": ""
          }

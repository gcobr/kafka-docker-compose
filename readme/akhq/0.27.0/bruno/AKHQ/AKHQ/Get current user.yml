info:
  name: Get current user
  type: http
  seq: 3
  tags:
    - AKHQ

http:
  method: GET
  url: "{{baseUrl}}/api/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: users 200 response
    request:
      url: "{{baseUrl}}/api/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "logged": false,
            "username": "",
            "roles": [
              {
                "resources": [
                  "TOPIC"
                ],
                "actions": [
                  "READ"
                ],
                "patterns": [],
                "clusters": []
              }
            ]
          }

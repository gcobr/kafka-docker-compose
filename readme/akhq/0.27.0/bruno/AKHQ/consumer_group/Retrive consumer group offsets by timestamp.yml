info:
  name: Retrive consumer group offsets by timestamp
  type: http
  seq: 9
  tags:
    - consumer_group

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/group/:groupName/offsets/start"
  params:
    - name: cluster
      value: ""
      type: path
    - name: groupName
      value: ""
      type: path
    - name: timestamp
      value: ""
      type: query
  auth: inherit

settings:

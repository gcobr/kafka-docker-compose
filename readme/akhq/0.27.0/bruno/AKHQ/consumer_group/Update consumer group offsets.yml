  type: http
  seq: 8
  tags:
    - consumer_group

http:
  method: POST
  url: "{{baseUrl}}/api/:cluster/group/:groupName/offsets"
  params:
    - name: cluster
      value: ""
      type: path
    - name: groupName
      value: ""
      type: path
  body:
    type: json
    data: |-
      [
        {
          "topic": "",
          "partition": 0,
          "offset": 0
        }
      ]

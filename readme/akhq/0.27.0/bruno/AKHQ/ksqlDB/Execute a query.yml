info:
  name: Execute a query
  type: http
  seq: 4
  tags:
    - ksqlDB

http:
  method: PUT
  url: "{{baseUrl}}/api/:cluster/ksqldb/:ksqlDbId/queries/pull"
  params:
    - name: cluster
      value: ""
      type: path
    - name: ksqlDbId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "sql": "",
        "properties": {}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


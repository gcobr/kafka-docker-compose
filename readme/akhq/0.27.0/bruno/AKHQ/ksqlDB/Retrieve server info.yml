info:
  name: Retrieve server info
  type: http
  seq: 2
  tags:
    - ksqlDB

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/ksqldb/:ksqlDbId/info"
  params:
    - name: cluster
      value: ""
      type: path
    - name: ksqlDbId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: info 200 response
    request:
      url: "{{baseUrl}}/api/:cluster/ksqldb/:ksqlDbId/info"
      method: GET
      params:
        - name: cluster
          value: ""
          type: path
        - name: ksqlDbId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "serverVersion": "",
            "kafkaClusterId": "",
            "ksqlServiceId": ""
          }

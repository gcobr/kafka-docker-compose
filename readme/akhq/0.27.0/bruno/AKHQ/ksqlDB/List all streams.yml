  type: http
  seq: 5
  tags:
    - ksqlDB

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/ksqldb/:ksqlDbId/streams"
  params:
    - name: cluster
      value: ""
      type: path
    - name: ksqlDbId
      value: ""
      type: path
    - name: search
      value: ""
      type: query

info:
  name: Find a subject by the schema id
  type: http
  seq: 3
  tags:
    - schema_registry

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/schema/id/:id"
  params:
    - name: cluster
      value: ""
      type: path
      description: "- The cluster name"
    - name: id
      value: ""
      type: path
      description: "- The schema id"
    - name: topic
      value: ""
      type: query
      description: "- (Optional) The topic name"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: the most relevant subject
    request:
      url: "{{baseUrl}}/api/:cluster/schema/id/:id"
      method: GET
      params:
        - name: cluster
          value: ""
          type: path
          description: "- The cluster name"
        - name: id
          value: ""
          type: path
          description: "- The schema id"
        - name: topic
          value: ""
          type: query
          description: "- (Optional) The topic name"
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "subject": "",
            "version": 0,
            "compatibilityLevel": "NONE",
            "schema": "",
            "schemaType": "",
            "references": [
              {
                "name": "io.confluent.kafka.example.User",
                "subject": "User",
                "version": 1
              }
            ],
            "exception": ""
          }

docs: Find a subject by the schema id In case of several subjects matching the schema id, we use the topic name to get the most relevant subject that matches the topic name (TopicNameStrategy). If there is no topic or if the topic doesn't match any subject, return the first subject that matches the schema id.

info:
  name: List all preferred schemas for a topic
  type: http
  seq: 4
  tags:
    - schema_registry

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/schema/topic/:topic"
  params:
    - name: cluster
      value: ""
      type: path
    - name: topic
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: listSchemaForTopic 200 response
    request:

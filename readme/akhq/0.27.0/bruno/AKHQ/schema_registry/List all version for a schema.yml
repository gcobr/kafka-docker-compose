info:
  name: List all version for a schema
  type: http
  seq: 8
  tags:
    - schema_registry

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/schema/:subject/version"
  params:
    - name: cluster
      value: ""
      type: path
    - name: subject
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: versions 200 response
    request:
      url: "{{baseUrl}}/api/:cluster/schema/:subject/version"
      method: GET
      params:
        - name: cluster
          value: ""
          type: path
        - name: subject
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "subject": "",
              "version": 0,
              "compatibilityLevel": "NONE",
              "schema": "",
              "schemaType": "",
              "references": [
                {
                  "name": "io.confluent.kafka.example.User",
                  "subject": "User",
                  "version": 1
                }
              ],
              "exception": ""
            }
          ]

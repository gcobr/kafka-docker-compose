info:
  name: List all partition from a topic
  type: http
  seq: 14
  tags:
    - topic

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/topic/:topicName/partitions"
  params:
    - name: cluster
      value: ""
      type: path
    - name: topicName
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: partitions 200 response
    request:
      url: "{{baseUrl}}/api/:cluster/topic/:topicName/partitions"
      method: GET
      params:
        - name: cluster
          value: ""
          type: path
        - name: topicName
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:

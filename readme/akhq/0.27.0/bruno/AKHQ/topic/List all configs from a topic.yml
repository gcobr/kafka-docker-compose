info:
  name: List all configs from a topic
  type: http
  seq: 10
  tags:
    - topic

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/topic/:topicName/configs"
  params:
    - name: cluster
      value: ""
      type: path
    - name: topicName
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: config 200 response
    request:
      url: "{{baseUrl}}/api/:cluster/topic/:topicName/configs"
      method: GET
      params:
        - name: cluster
          value: ""
          type: path
        - name: topicName
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "name": "",
              "value": "",
              "description": "",
              "source": "DYNAMIC_TOPIC_CONFIG",
              "sensitive": false,
              "readOnly": false,
              "synonyms": [
                {
                  "name": "",
                  "value": "",
                  "source": "DYNAMIC_TOPIC_CONFIG"
                }
              ]
            }
          ]

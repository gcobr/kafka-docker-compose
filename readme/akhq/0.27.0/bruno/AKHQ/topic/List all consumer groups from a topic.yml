info:
  name: List all consumer groups from a topic
  type: http
  seq: 12
  tags:
    - topic

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/topic/:topicName/groups"
  params:
    - name: cluster
      value: ""
      type: path
    - name: topicName
      value: ""
      type: path
    - name: groupsListView
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

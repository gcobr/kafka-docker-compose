info:
  name: Get acls for a principal
  type: http
  seq: 2
  tags:
    - acls

http:
  method: GET
  url: "{{baseUrl}}/api/:cluster/acls/:principal"
  params:
    - name: cluster
      value: ""
      type: path
    - name: principal
      value: ""
      type: path
    - name: resourceType
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: principal 200 response
    request:
      url: "{{baseUrl}}/api/:cluster/acls/:principal"
      method: GET
      params:
        - name: cluster
          value: ""
          type: path
        - name: principal
          value: ""
          type: path
        - name: resourceType
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "principal": "",
            "acls": [
              {
                "host": "",
                "operation": {
                  "operation": "UNKNOWN",
                  "permissionType": "UNKNOWN"
                },
                "resource": {
                  "resourceType": "UNKNOWN",
                  "name": "",
                  "patternType": "UNKNOWN"
                }
              }
            ]
          }

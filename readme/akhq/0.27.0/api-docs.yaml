                  $ref: "#/components/schemas/RecordRepository.TimeOffset"
  /api/{cluster}/topic/{topicName}/partitions:
    get:
      tags:
      - topic
      summary: List all partition from a topic
      operationId: partitions
      parameters:
      - name: cluster
        in: path
        required: true
        schema:
          type: string
      - name: topicName
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: partitions 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partition"
    post:
      tags:
      - topic
      summary: Increase partition for a topic
      operationId: increasePartition
      parameters:
      - name: cluster
        in: path
        required: true
        schema:
          type: string
      - name: topicName
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: integer
                format: int32
        required: true
      responses:
        "200":
          description: increasePartition 200 response
          content:
            application/json:
              schema:
                type: object
  /api/{cluster}/ui-options:
    get:
      tags:
      - AKHQ
      summary: Get ui options for cluster
      operationId: options
      parameters:
      - name: cluster
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: options 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection.UiOptions"
